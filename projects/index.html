<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects | Kaung Htet Ko</title>
    <meta name="description"
        content="Browse all current projects by Kaung Htet Ko, including mobile development and portfolio improvements.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <nav class="nav scrolled" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">Htet <span>Ko</span></a>
            <div class="nav-links">
                <a href="../index.html#about" class="nav-link">About</a>
                <a href="../index.html#projects" class="nav-link">Projects</a>
                <a href="../index.html#skills" class="nav-link">Skills</a>
                <a href="../index.html#blog" class="nav-link">Blog</a>
                <a href="../index.html#contact" class="nav-link">Contact</a>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="display: none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="post-page">
        <div class="post-content">
            <a href="../index.html#projects" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Back to Home
            </a>

            <header class="post-header">
                <h1 class="post-title">All Current Projects</h1>
                <p class="post-meta">Browse all projects I'm actively working on</p>
            </header>

            <div class="blog-grid" id="allProjectsGrid">
                <!-- All project cards will be dynamically loaded here -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">© 2026 Kaung Htet Ko. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const savedTheme = localStorage.getItem('theme') || localStorage.getItem('pref-theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            sunIcon.style.display = isLight ? 'block' : 'none';
            moonIcon.style.display = isLight ? 'none' : 'block';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            localStorage.setItem('pref-theme', isLight ? 'light' : 'dark');
        });

        // Dynamic Projects Loading - All Projects
        const allProjectsGrid = document.getElementById('allProjectsGrid');

        async function loadAllProjects() {
            try {
                const response = await fetch('posts.json');
                const projects = await response.json();

                projects.sort((a, b) => new Date(b.date) - new Date(a.date));

                const COLORS = ['#e94560', '#06d6a0', '#00d4ff', '#ffd166', '#9b72ff'];
                allProjectsGrid.innerHTML = projects.map((project, i) => {
                    const color = COLORS[i % COLORS.length];
                    return `
                    <article class="proj-card" style="--card-accent: ${color}">
                        <a href="${project.slug}/index.html" aria-label="${project.title}" style="text-decoration:none;color:inherit;display:contents">
                        <div class="proj-card-meta">
                            <span class="proj-card-date">${project.displayDate}</span>
                            <span class="proj-card-tag" style="color:${color};background:${color}22;border-color:${color}44">${project.tag}</span>
                        </div>
                        <h3 class="proj-card-title">${project.title}</h3>
                        <p class="proj-card-excerpt">${project.excerpt}</p>
                        <span class="proj-card-arrow">↗</span>
                        </a>
                    </article>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading projects:', error);
                allProjectsGrid.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">Unable to load projects.</p>';
            }
        }

        loadAllProjects();
    </script>
</body>

</html>
